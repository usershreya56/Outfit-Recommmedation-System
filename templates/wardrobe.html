<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<h1> My Wardrobe</h1>

<form method="POST">
    <input type="text" name="item" placeholder="Item name">
    <input type="text" name="type" placeholder="Type (top/bottom)">
    <button>Add</button>
</form>

<ul>
    {% for i in items %}
        <li>{{ i[0] }} ({{ i[1] }})</li>
    {% endfor %}
</ul>

<a href="/dashboard">⬅ Back</a>

</body>
</html>
