<!DOCTYPE html>
<html>
<head>
  <title>History</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
  <h2>📜 Outfit History</h2>

  <ul>
    {% for item in data %}
      <li>
        🌤 {{item[1]}} | 🎯 {{item[2]}} → 👕 {{item[3]}}
        <a href="/delete/{{item[0]}}">❌</a>
      </li>
    {% endfor %}
  </ul>

  <a href="/">⬅ Back</a>
</div>

</body>
</html>
